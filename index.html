<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNAD INDUSTRIES // DREX-LP 050</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Anton&family=VT323&display=swap');

  :root {
    --board: #0a3fa8;
    --board2: #1052d6;
    --rail: #0a3186;
    --screw: #1a4db0;
    --ink: #e8eeff;
    --dim: #9fb4e8;
    --sig: #ffd400;        /* gelb als akzent auf blau */
    --amber: #ff6a00;
    --ice: #bdfaff;
    --live: #6bff8c;
    --line: #2a5bc0;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background:
      radial-gradient(ellipse at 50% 0%, #1c1d22 0%, #0c0d10 70%),
      #0c0d10;
    background-attachment: fixed;
    color: var(--ink);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 20px 60px;
  }

  /* ---------- Kopf ---------- */
  .head {
    grid-column: 1 / -1;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 8px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--line);
  }
  .head-left { display: flex; flex-direction: column; }
  .corp {
    font-size: 11px; font-weight: 700;
    color: var(--sig); text-transform: uppercase;
    text-shadow: 0 0 8px rgba(255,212,0,.4);
    display: flex; align-items: center; gap: 7px;
    white-space: nowrap;
  }
  .corp .corp-txt {
    display: inline-block;
    letter-spacing: .34em;
  }
  .corp svg { width: 17px; height: 12px; flex: none; }
  .title { margin: 5px 0 0; }
  .title h1 {
    font-family: 'Anton', 'Arial Black', sans-serif;
    font-size: 44px; line-height: .9; letter-spacing: .02em;
    margin: 0; color: #fff;
    text-shadow: 0 2px 0 #000, 0 0 22px rgba(255,255,255,.18);
    display: flex; align-items: baseline; gap: 12px;
  }
  .title h1 .model-no {
    font-family: 'Anton', 'Arial Black', sans-serif;
    font-weight: 400;
    font-size: 44px;
    color: var(--ink);
    letter-spacing: .02em;
    text-shadow: 0 2px 0 #000, 0 0 22px rgba(232,238,255,.25);
  }
  .title .sub {
    font-size: 16px; letter-spacing: .46em; color: rgba(255,255,255,.28);
    text-transform: uppercase; margin-top: 6px;
  }
  .status-bar {
    background: #07080a;
    border: 1px solid var(--line);
    border-radius: 5px;
    padding: 0 18px;
    width: 280px; min-width: 280px; max-width: 280px;
    height: 44px; min-height: 44px; max-height: 44px;
    flex: none;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 13px; letter-spacing: .12em;
    color: var(--live);
    box-shadow: inset 0 0 20px rgba(0,0,0,.6);
    overflow: hidden; white-space: nowrap;
    box-sizing: border-box;
  }
  .status-bar .tc::after { content: "\258B"; margin-left: 7px; animation: blink 1.1s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  .head-right { display: flex; flex-direction: row; align-items: center; gap: 76px; }
  .head-transport { display: flex; align-items: center; gap: 10px; }
  .tbtn {
    background: #0e0f12; border: 1px solid var(--line); color: var(--ink);
    width: 38px; height: 32px; border-radius: 4px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
  }
  .tbtn:hover { border-color: var(--dim); }
  .tbtn:active { transform: translateY(1px); }
  .tbtn.go { color: var(--live); border-color: rgba(107,255,140,.45); }
  .tbtn.go:hover { box-shadow: 0 0 8px rgba(107,255,140,.3); }

  /* ---------- Board (Gehaeuse) ---------- */
  .board {
    width: 100%;
    max-width: 1180px;
    background: linear-gradient(180deg, var(--board2) 0%, var(--board) 100%);
    border: 1px solid #000;
    border-radius: 10px;
    padding: 22px 24px 16px;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.08),
      inset 0 -3px 12px rgba(0,0,0,.35),
      0 18px 40px rgba(0,0,0,.55);
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: relative;
  }
  .pedal-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 18px;
  }
  /* Board-Schrauben in den Ecken */
  .screw {
    position: absolute; width: 12px; height: 12px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #54555c, #25262b 70%);
    box-shadow: inset 0 0 0 1px rgba(0,0,0,.5), 0 1px 1px rgba(255,255,255,.05);
  }
  .screw::after {
    content: ""; position: absolute; inset: 3px;
    background: linear-gradient(45deg, transparent 44%, #1a1b1f 44% 56%, transparent 56%);
  }
  .screw.tl { top: 8px; left: 8px; } .screw.tr { top: 8px; right: 8px; }
  .screw.bl { bottom: 8px; left: 8px; } .screw.br { bottom: 8px; right: 8px; }

  /* ---------- Pedal ---------- */
  .pedal {
    background: linear-gradient(180deg, #2e313a 0%, #20222a 100%);
    border: 1px solid #000;
    border-radius: 8px;
    padding: 32px 12px 34px;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.1),
      inset 0 -2px 8px rgba(0,0,0,.45),
      0 6px 14px rgba(0,0,0,.45);
    position: relative;
  }
  .pedal-screw {
    position: absolute; width: 7px; height: 7px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #4a4b52, #1d1e22 70%);
  }
  .pedal-screw.a { top: 6px; left: 6px; } .pedal-screw.b { top: 6px; right: 6px; }
  .pedal-screw.c { bottom: 6px; left: 6px; } .pedal-screw.d { bottom: 6px; right: 6px; }

  .pedal-label {
    font-size: 10px; letter-spacing: .2em; color: var(--dim);
    text-transform: uppercase;
  }
  .pedal-num {
    font-family: 'Anton', sans-serif;
    font-size: 13px; letter-spacing: .1em; color: var(--ink);
  }

  /* Status-Ring */
  .ring-wrap { position: relative; width: 88px; height: 88px; margin: 11px 0; }
  .ring-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: #0c0d10; stroke-width: 7; }
  .ring-fg { fill: none; stroke: var(--track-col, var(--ice)); stroke-width: 7;
    stroke-linecap: round; stroke-dasharray: 245; stroke-dashoffset: 245;
    filter: drop-shadow(0 0 4px var(--track-col, var(--ice))); }
  .ring-core {
    position: absolute; inset: 16px; border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, #2a2b31, #131419 75%);
    border: 1px solid #000;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; letter-spacing: .1em; color: var(--dim); text-align: center;
  }

  /* Fader */
  .fader-row { display: flex; align-items: center; gap: 7px; flex: none; }
  .pkmeter {
    width: 8px; height: 185px; flex: none;
    background: #0c0d10; border: 1px solid #000; border-radius: 3px;
    position: relative; overflow: hidden;
    box-shadow: inset 0 0 5px rgba(0,0,0,.8);
  }
  .pkfill {
    position: absolute; left: 0; right: 0; bottom: 0; height: 0%;
    background: linear-gradient(180deg, #ff3b30 0%, #ffea00 35%, #6bff8c 100%);
    transition: height 0.05s linear;
  }
  .fader {
    width: 34px; height: 185px; flex: none;
    background: linear-gradient(180deg, #0c0d10, #1a1b20);
    border: 1px solid #000; border-radius: 5px;
    position: relative; overflow: hidden;
    box-shadow: inset 0 0 10px rgba(0,0,0,.8);
  }
  .fader-slot {
    position: absolute; left: 50%; top: 10px; bottom: 10px; width: 4px;
    transform: translateX(-50%);
    background: linear-gradient(90deg, #000, #050608, #000); border-radius: 2px;
    box-shadow: inset 0 0 3px #000;
  }
  .fader-cap {
    position: absolute; left: 50%; width: 28px; height: 17px;
    transform: translateX(-50%);
    background: linear-gradient(180deg, #6a6c78 0%, #43454f 50%, #2c2e36 51%, #3a3c45 100%);
    border: 1px solid #000; border-radius: 4px;
    box-shadow: 0 2px 4px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,.25);
    cursor: ns-resize;
  }
  .fader-cap::after {
    content: ""; position: absolute; left: 4px; right: 4px; top: 50%;
    height: 2px; background: var(--track-col, #fff); transform: translateY(-50%);
    box-shadow: 0 0 6px var(--track-col, #fff);
  }

  /* Stomp-Schalter */
  .stomp {
    width: 94px; height: 94px; border-radius: 50%; flex: none; overflow: hidden;
    background: radial-gradient(circle at 38% 32%, #5a5c66 0%, #34363f 45%, #1b1c22 80%);
    border: 1px solid #000;
    box-shadow: 0 5px 10px rgba(0,0,0,.55), inset 0 2px 0 rgba(255,255,255,.18), inset 0 -4px 8px rgba(0,0,0,.55);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform .05s;
    position: relative;
  }
  .stomp:active { transform: translateY(2px); box-shadow: 0 2px 4px rgba(0,0,0,.5), inset 0 2px 0 rgba(255,255,255,.18); }
  .stomp .cap {
    width: 62px; height: 62px; border-radius: 50%;
    background: radial-gradient(circle at 38% 32%, #3a3c45, #16171c 80%);
    border: 1px solid #000;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.12), inset 0 -2px 4px rgba(0,0,0,.6);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; letter-spacing: .08em; color: var(--ink);
  }
  .stomp .led {
    position: absolute; top: -4px; left: 50%; transform: translateX(-50%);
    width: 8px; height: 8px; border-radius: 50%;
    background: #2a0a08; box-shadow: 0 0 2px #000;
  }

  /* kleine Transport-Reihe */
  .ptrans { display: flex; gap: 7px; }
  .ptrans button {
    min-width: 34px; height: 26px; padding: 0 7px; border-radius: 4px;
    background: linear-gradient(180deg, #2c2e36 0%, #1a1b20 100%);
    border: 1px solid #000;
    color: var(--dim); font-size: 9px; letter-spacing: .06em; cursor: pointer;
    font-family: 'Space Mono', monospace; font-weight: 700;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.1), 0 2px 3px rgba(0,0,0,.5);
    transition: transform .05s, color .12s;
  }
  .ptrans button:hover { color: var(--ink); }
  .ptrans button:active { transform: translateY(1px); box-shadow: inset 0 1px 0 rgba(255,255,255,.1), 0 1px 1px rgba(0,0,0,.5); }
  .ptrans button.on { color: #0d0e12; }
  .ptrans button.on[data-act="mute"] { background: linear-gradient(180deg, #ff8a3a, #ff6a00); border-color: #c04e00; box-shadow: 0 0 8px rgba(255,106,0,.5); }
  .ptrans button.on[data-act="fx"] { background: linear-gradient(180deg, var(--track-col), var(--track-col)); border-color: #000; box-shadow: 0 0 8px var(--track-col); }

  /* ---------- Master-Leiste ---------- */
  .master {
    display: flex; align-items: center; gap: 14px;
    background: rgba(0,0,0,.22);
    border: 1px solid rgba(0,0,0,.4); border-radius: 8px;
    padding: 0 16px;
    height: 48px; min-height: 48px; max-height: 48px;
    box-sizing: border-box; overflow: hidden;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.04), inset 0 -2px 8px rgba(0,0,0,.3);
    flex: none;
  }
  .master .lbl { font-size: 10px; letter-spacing: .2em; color: var(--dim); white-space: nowrap; overflow: hidden; }
  .mbtn {
    background: #0e0f12; border: 1px solid var(--line); color: var(--ink);
    font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: .08em;
    padding: 9px 14px; border-radius: 4px; cursor: pointer;
  }
  .mbtn:hover { border-color: var(--dim); }
  .mbtn.go { color: var(--live); border-color: rgba(107,255,140,.4); }
  .mbtn.mode-btn.active { color: var(--live); border-color: rgba(107,255,140,.4); box-shadow: 0 0 8px rgba(107,255,140,.2); }
  .mbtn.rec { color: var(--sig); border-color: rgba(255,59,48,.4); }
  .grow { flex: 1; }
  .tempo {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--dim); letter-spacing: .12em;
  }
  .tempo input {
    width: 52px; min-width: 52px; max-width: 52px;
    height: 32px; min-height: 32px; max-height: 32px;
    background: #07080a; border: 1px solid var(--line);
    color: var(--ink); font-family: 'Space Mono', monospace; font-size: 14px;
    text-align: center; padding: 0 4px; border-radius: 3px;
    overflow: hidden; box-sizing: border-box; flex: none;
  }
  .ingain { display: flex; align-items: center; gap: 8px; flex: none; }
  .out-meter {
    position: relative; flex: 1;
    height: 14px; min-height: 14px; max-height: 14px;
    background: #0a0b0e; border: 1px solid var(--line); overflow: hidden; border-radius: 2px;
    box-shadow: inset 0 0 8px rgba(0,0,0,.7);
    box-sizing: border-box;
  }
  .out-meter > i {
    display: block; height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--amber) 0%, var(--sig) 65%, #fff 100%);
    transition: width 60ms linear;
  }
  .out-meter::after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(90deg, transparent 0 6px, rgba(0,0,0,.78) 6px 8px);
  }
  .ingain input[type="range"] {
    width: 90px; min-width: 90px; max-width: 90px;
    accent-color: var(--amber); cursor: pointer; flex: none;
  }
  #inGainVal { color: var(--amber); width: 38px; min-width: 38px; max-width: 38px; overflow: hidden; white-space: nowrap; }

  /* ---------- Editor (zweite Ebene, im Chassis) ---------- */
  .editor-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .editor-title {
    font-family: 'Anton', sans-serif; font-size: 18px; letter-spacing: .15em;
    color: var(--ink); text-shadow: 0 0 10px rgba(255,255,255,.15);
  }
  .editor-tracks { display: flex; flex-direction: column; gap: 8px; }

  /* FX-Zeile */
  .efx-row {
    display: flex; align-items: center; gap: 8px; flex-wrap: nowrap;
    background: rgba(0,0,0,.3); border: 1px solid rgba(255,255,255,.06);
    border-radius: 6px; padding: 8px 12px;
    margin-top: -4px;    /* direkt an die Spur-Zeile andocken */
  }
  .efx-block {
    background: linear-gradient(180deg, #1e2028, #14151a);
    border: 1px solid var(--line); border-radius: 5px;
    padding: 6px 10px; cursor: grab;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    min-width: 60px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
    transition: border-color .1s;
    user-select: none;
  }
  .efx-block.on {
    border-color: var(--track-col, var(--amber));
    box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 0 8px rgba(255,106,0,.25);
  }
  .efx-block.dragging { opacity: .4; }
  .efx-block.drag-over { border-color: #fff; }
  .efx-label {
    font-size: 9px; letter-spacing: .15em; color: var(--dim); font-weight: 700;
  }
  .efx-onbtn {
    font-size: 8px; letter-spacing: .1em; padding: 2px 6px; border-radius: 3px;
    background: #0e0f12; border: 1px solid var(--line); color: var(--dim); cursor: pointer;
  }
  .efx-block.on .efx-onbtn {
    background: var(--amber); border-color: #c05000; color: #0d0e12; font-weight: 700;
  }
  .efx-actions {
    display: flex; flex-direction: column; gap: 4px; margin-left: auto; flex: none;
  }
  .efx-undo, .efx-apply {
    font-size: 9px; padding: 4px 10px;
  }
  .efx-apply { color: var(--live); border-color: rgba(107,255,140,.4); }
  .efx-toggle.on-fx { color: var(--amber); border-color: var(--amber); }

  /* FX-Popup */
  .efx-popup {
    position: fixed; z-index: 9999;
    background: #16181f; border: 1px solid var(--line);
    border-radius: 8px; padding: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,.08);
    min-width: 180px;
  }
  .efx-popup-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px; padding-bottom: 8px;
    border-bottom: 1px solid var(--line);
    font-size: 11px; letter-spacing: .18em; color: var(--amber); font-weight: 700;
  }
  .efx-popup-close {
    background: none; border: none; color: var(--dim); cursor: pointer;
    font-size: 13px; padding: 0 2px; line-height: 1;
  }
  .efx-popup-close:hover { color: #fff; }
  .efx-popup-body {}

  /* EQ-Kurven-Display im Popup (Knob-Drag-Stil, aus dem Drecksler portiert) */
  .efx-eq-graph-wrap {
    position: relative; width: 340px; height: 160px;
    border: 1px solid var(--line); border-radius: 6px;
    background: rgba(0,0,0,.5); overflow: hidden;
  }
  .efx-eq-graph-wrap canvas { width: 100%; height: 100%; display: block; cursor: ns-resize; }

  /* Knob-Regler im Popup */
  .efx-knob-row { display: flex; gap: 16px; flex-wrap: wrap; }
  .efx-knob-grp { display: flex; flex-direction: column; gap: 4px; min-width: 100px; }
  .efx-knob-grp label { font-size: 9px; letter-spacing: .15em; color: var(--dim); }
  .efx-knob-grp input[type="range"] { accent-color: var(--amber); width: 100%; cursor: pointer; }
  .efx-val { font-size: 9px; color: var(--ink); letter-spacing: .05em; }
  .etrack {
    display: flex; align-items: center; gap: 12px;
    background: #0c0d10; border: 1px solid #000; border-radius: 6px;
    padding: 8px 12px; position: relative;
    border-left: 4px solid var(--track-col, #fff);
    box-shadow: inset 0 0 12px rgba(0,0,0,.5);
  }
  .etrack-num {
    font-family: 'Anton', sans-serif; font-size: 13px; letter-spacing: .08em;
    color: var(--track-col, #fff); min-width: 48px;
  }
  .etrack-wave {
    flex: 1; height: 84px; min-height: 84px; max-height: 84px;
    position: relative;
    background: #07080a; border: 1px solid var(--line); border-radius: 4px;
    overflow: hidden;
  }
  .etrack-wave canvas { display: block; width: 100%; height: 100%; }
  .etrack-cursor {
    position: absolute; top: 0; bottom: 0; width: 2px;
    background: var(--track-col, #fff); box-shadow: 0 0 6px var(--track-col, #fff);
    left: 0; pointer-events: none; opacity: 0;
  }
  .etrack-empty {
    flex: 1; height: 84px; min-height: 84px; max-height: 84px;
    display: flex; align-items: center; justify-content: center;
    color: var(--dim); font-size: 11px; letter-spacing: .15em;
    background: #07080a; border: 1px dashed var(--line); border-radius: 4px;
  }
  .etrack-ctrls { display: flex; align-items: center; gap: 8px; }
  .ebtn {
    width: 34px; height: 26px; border-radius: 4px;
    background: linear-gradient(180deg, #2c2e36, #1a1b20); border: 1px solid #000;
    color: var(--dim); font-size: 9px; font-weight: 700; cursor: pointer;
    font-family: 'Space Mono', monospace;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.1), 0 2px 3px rgba(0,0,0,.5);
  }
  .ebtn:active { transform: translateY(1px); }
  .ebtn.on-mute { background: linear-gradient(180deg, #ff8a3a, #ff6a00); color: #0d0e12; border-color: #c04e00; box-shadow: 0 0 8px rgba(255,106,0,.5); }
  .ebtn.on-solo { background: linear-gradient(180deg, #ffe14d, #ffd400); color: #0d0e12; border-color: #c0a000; box-shadow: 0 0 8px rgba(255,212,0,.5); }
  .eknob { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .eknob input[type="range"] { width: 80px; accent-color: var(--track-col, #fff); cursor: pointer; }
  .eknob.pan input[type="range"] { width: 60px; accent-color: var(--ice); }
  .eknob span { font-size: 8px; letter-spacing: .1em; color: var(--dim); }

  .foot {
    display: flex; justify-content: space-between;
    font-family: 'Anton', sans-serif; letter-spacing: .3em;
    color: rgba(255,255,255,.28); font-size: 13px;
    padding-top: 4px;
  }
</style>
</head>
<body>

  <div class="board" id="chassis">
    <span class="screw tl"></span><span class="screw tr"></span>
    <span class="screw bl"></span><span class="screw br"></span>
    <div class="head">
      <div class="head-left">
        <div class="corp">
          <svg viewBox="0 0 18 13" aria-hidden="true"><g fill="currentColor">
            <rect x="0" y="5" width="2" height="3"/><rect x="4" y="3" width="2" height="7"/>
            <rect x="8" y="1" width="2" height="11"/><rect x="12" y="4" width="2" height="5"/>
            <rect x="16" y="2" width="2" height="9"/>
          </g></svg>
          <span class="corp-txt">SNAD INDUSTRIES</span>
        </div>
        <div class="title">
          <h1>DREX-LP<span class="model-no">050</span></h1>
          <div class="sub">LOOP MACHINE</div>
        </div>
      </div>
      <div class="head-right">
        <div class="head-transport">
          <button class="tbtn go" id="playAll" title="Alle Spuren abspielen"><svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><polygon points="4,1 23,12 4,23" fill="currentColor"/></svg></button>
          <button class="tbtn" id="stopAll" title="Stopp"><svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><rect x="1" y="1" width="22" height="22" fill="currentColor"/></svg></button>
          <div class="tempo">
            <span class="lbl">TEMPO</span>
            <input type="number" id="tempo" value="120" min="40" max="240">
            <span>BPM</span>
          </div>
          <div class="tempo">
            <span class="lbl">BARS</span>
            <input type="number" id="bars" value="4" min="1" max="8" step="4">
          </div>
        </div>
        <div class="status-bar">
          <span>SYSTEM // STANDBY</span>
          <span class="tc">00:00.0</span>
        </div>
      </div>
    </div>
    <div id="board-panel">
      <div class="pedal-grid" id="board">
        <!-- Pedale werden per JS erzeugt -->
      </div>
      <div class="master">
        <span class="lbl">MASTER</span>
        <button class="mbtn" id="editorBtn" title="Multitrack-Editor">EDITOR</button>
        <button class="mbtn" id="monBtn" title="Live-Monitoring">MONITOR</button>
        <button class="mbtn" id="calBtn" title="Latenz messen">CAL</button>
        <button class="mbtn mode-btn active" id="modeBtn" title="SESSION: sofort aufnehmen / PRECISE: Warmup und Count-in">SESSION</button>
        <div class="ingain">
          <span class="lbl">IN</span>
          <input type="range" id="inGain" min="0" max="300" value="100">
          <span class="lbl" id="inGainVal">100%</span>
        </div>
        <div class="out-meter" title="Gesamt-Pegel"><i id="outMeterFill"></i></div>
      </div>
    </div>

    <div id="editor-panel" style="display:none;">
      <div class="editor-nav">
        <span class="editor-title">EDITOR // MULTITRACK</span>
        <button class="mbtn" id="boardBtn">&laquo; BOARD</button>
      </div>
      <div class="editor-tracks" id="editorTracks">
        <!-- Spurzeilen werden per JS erzeugt -->
      </div>
      <div class="master">
        <span class="lbl">EDITOR</span>
        <span class="grow"></span>
        <div class="out-meter" title="Gesamt-Pegel"><i id="outMeterFillEd"></i></div>
        <button class="mbtn" id="expWav">EXPORT // WAV</button>
        <button class="mbtn" id="expAt">TRANSMIT // AUDIOTOOL</button>
      </div>
    </div>

    <div class="foot">
      <span>DREX-LP 050 &middot; REV 0.51</span>
      <span>THE SIGNAL CONTINUES</span>
    </div>
  </div>

<script>
  "use strict";
  const TRACK_COLS = ["#ffffff", "#ff6a00", "#6bff8c", "#ff5bd0", "#ffea00"];
  const board = document.getElementById("board");
  const N_TRACKS = 5;

  // ---------- globaler Zustand ----------
  let ac = null;                 // AudioContext (lazy)
  let micStream = null, micSource = null;
  let monGain = null, monitorOn = false;
  let sessionMode = true;   // Default: SESSION
  let inputAnalyser = null;
  let inputGain = null, inputGainValue = 1.0;
  let firstCountInRunning = false;
  let warmupClockStarted = false;
  let masterGain = null;
  let metroGain = null;
  let masterAnalyser = null;
  let tempo = 120, bars = 4;
  let latencyComp = 0;           // gemessene Round-Trip-Latenz in Sekunden
  let metroRoot = 69;            // A4
  let metroOn = true;            // Count-in/Tempo hoerbar
  let loopLenSec = 0;            // Laenge des Loops in Sekunden (von erster Spur / bars+tempo)
  let transportStart = 0;        // ac.currentTime an dem der Loop-Zyklus 0 begann
  let transportRunning = false;

  // pro Spur
  const tracks = [];
  for (let i = 0; i < N_TRACKS; i++) {
    tracks[i] = {
      idx: i, buffer: null, gainNode: null, panNode: null,
      srcNode: null, level: 0.8, pan: 0, muted: false, solo: false,
      state: "empty",           // empty | warmup | armed | recording | loop
      recChunks: null, recProc: null, recStartTime: 0,
      el: null, ring: null, core: null, cap: null, led: null,
      eRow: null, eCanvas: null, eCursor: null,
      fxChain: ["eq", "distortion", "chorus", "reverb", "gate"],
      fxParams: {
        eq:         { bands: [0,0,0,0,0,0,0,0] },
        distortion: { drive: 0.3, on: false },
        chorus:     { depth: 30, rate: 1.5, on: false },
        reverb:     { size: 0.3, wet: 0.3, on: false },
        gate:       { threshold: -40, on: false },
      },
      fxHistory: null,
    };
  }

  // ---------- Audio-Setup (lazy beim ersten Bedarf) ----------
  async function ensureAudio() {
    if (ac) return true;
    try {
      ac = new (window.AudioContext || window.webkitAudioContext)({ latencyHint: "interactive" });
      masterGain = ac.createGain();
      masterGain.gain.value = 1.0;
      masterGain.connect(ac.destination);
      // Analyser fuer Gesamt-Peak-Meter
      masterAnalyser = ac.createAnalyser();
      masterAnalyser.fftSize = 256;
      masterGain.connect(masterAnalyser);
      // eigener Gain fuer Metronom-Klicks, zum sofortigen Stummschalten
      metroGain = ac.createGain();
      metroGain.gain.value = 1.0;
      metroGain.connect(masterGain);
      // Latenz schaetzen: base + output (falls verfuegbar)
      const base = ac.baseLatency || 0;
      const out = ac.outputLatency || 0;
      latencyComp = base + out;
      return true;
    } catch (e) {
      setStatus("AUDIO INIT FAILED");
      return false;
    }
  }

  async function ensureMic() {
    if (micStream) return true;
    try {
      micStream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
      });
      micSource = ac.createMediaStreamSource(micStream);
      // Input-Gain: skaliert das Mic-Signal vor Aufnahme/Meter/Monitoring
      inputGain = ac.createGain();
      inputGain.gain.value = inputGainValue;
      micSource.connect(inputGain);
      // Eingangs-Analyser fuer Peak-Meter (nach dem Input-Gain)
      inputAnalyser = ac.createAnalyser();
      inputAnalyser.fftSize = 256;
      inputGain.connect(inputAnalyser);
      // Monitoring-Pfad: per monGain zuschaltbar
      monGain = ac.createGain();
      monGain.gain.value = monitorOn ? 1 : 0;
      inputGain.connect(monGain);
      monGain.connect(masterGain);
      return true;
    } catch (e) {
      setStatus("MIC DENIED");
      return false;
    }
  }

  // ---------- Status-Leiste ----------
  const statusEl = document.querySelector(".status-bar span:first-child");
  function setStatus(t) { if (statusEl) statusEl.textContent = t; }

  // ---------- Metronom (stimmbarer Klick, Verfahren aus dem Drecksler) ----------
  const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  function noteName(midi) { return NOTE_NAMES[((midi%12)+12)%12] + (Math.floor(midi/12)-1); }
  function midiToHz(midi) { return 440 * Math.pow(2, (midi-69)/12); }
  function scheduleClick(time, accent, octaveShift) {
    const osc = ac.createOscillator(), g = ac.createGain();
    osc.type = "sine"; osc.frequency.value = midiToHz(metroRoot + (octaveShift || 0));
    osc.connect(g); g.connect(metroGain || masterGain);
    if (accent) {
      g.gain.setValueAtTime(0.0001, time);
      g.gain.exponentialRampToValueAtTime(0.34, time + 0.004);
      g.gain.exponentialRampToValueAtTime(0.0001, time + 0.18);
      osc.start(time); osc.stop(time + 0.22);
    } else {
      g.gain.setValueAtTime(0.0001, time);
      g.gain.exponentialRampToValueAtTime(0.13, time + 0.002);
      g.gain.exponentialRampToValueAtTime(0.0001, time + 0.06);
      osc.start(time); osc.stop(time + 0.08);
    }
  }

  // ---------- Timing-Helfer ----------
  function beatDur() { return 60 / tempo; }
  function barDur() { return beatDur() * 4; }           // 4/4
  function loopDuration() { return barDur() * bars; }   // 4 oder 8 Takte

  // Metronom-Klicks fuer einen Bereich planen (von startTime ueber n Takte) - fuer Count-in der ersten Spur
  function scheduleMetronome(startTime, nBars) {
    if (!metroOn) return;
    const bd = beatDur();
    for (let b = 0; b < nBars * 4; b++) {
      scheduleClick(startTime + b * bd, b % 4 === 0);
    }
  }

  // ---------- durchlaufendes Metronom (Look-Ahead-Scheduler) ----------
  let metroNextBeatTime = 0;     // ac-Zeit des naechsten geplanten Beats
  let metroClockStart = 0;       // ac-Zeit des Clock-Starts (fuer Ring-Position)
  let metroBeatIndex = 0;        // Zaehler fuer Downbeat-Akzent
  let metroTimer = null;
  function startMetronomeClock(fromTime, beatIndex) {
    metroNextBeatTime = fromTime;
    metroBeatIndex = beatIndex || 0;
    metroClockStart = fromTime;
    if (metroTimer) clearInterval(metroTimer);
    metroTimer = setInterval(metroScheduler, 25);
    metroScheduler();
  }
  function stopMetronomeClock() {
    if (metroTimer) { clearInterval(metroTimer); metroTimer = null; }
  }
  function metroScheduler() {
    if (!ac) return;
    const lookahead = 0.2;       // 200 ms im Voraus planen
    const bd = beatDur();
    while (metroNextBeatTime < ac.currentTime + lookahead) {
      if (metroOn) {
        scheduleClick(metroNextBeatTime, metroBeatIndex % 4 === 0, 0);
      }
      metroNextBeatTime += bd;
      metroBeatIndex++;
    }
  }

  // ---------- Aufnahme via ScriptProcessor (breit verfuegbar, auch GitHub Pages) ----------
  function startRecording(tr) {
    const proc = ac.createScriptProcessor(1024, 1, 1);
    tr.recChunks = [];
    proc.onaudioprocess = (e) => {
      const inp = e.inputBuffer.getChannelData(0);
      tr.recChunks.push(new Float32Array(inp));
    };
    (inputGain || micSource).connect(proc);
    proc.connect(ac.destination);   // ScriptProcessor braucht eine Senke, Ausgang ist still
    tr.recProc = proc;
    tr.recStartTime = ac.currentTime;
  }

  function stopRecording(tr) {
    if (!tr.recProc) return null;
    try { (inputGain || micSource).disconnect(tr.recProc); } catch (e) {}
    try { tr.recProc.disconnect(); } catch (e) {}
    tr.recProc.onaudioprocess = null;
    tr.recProc = null;
    // Chunks zusammenfuegen
    let total = 0;
    for (const c of tr.recChunks) total += c.length;
    const flat = new Float32Array(total);
    let o = 0;
    for (const c of tr.recChunks) { flat.set(c, o); o += c.length; }
    tr.recChunks = null;
    return flat;
  }

  // Aufnahme in einen sample-genauen Loop-Buffer giessen, latenz-kompensiert und phasenrichtig
  function bakeLoop(tr, flat) {
    const sr = ac.sampleRate;
    const loopSamples = Math.round(loopDuration() * sr);
    const compSamples = Math.round(latencyComp * sr);
    const buf = ac.createBuffer(1, loopSamples, sr);
    const out = buf.getChannelData(0);

    // Phase des realen Aufnahmebeginns relativ zum Transport-Raster bestimmen
    let phaseSamples = 0;
    if (transportRunning && loopLenSec > 0) {
      const phaseSec = ((tr.recStartTime - transportStart) % loopLenSec + loopLenSec) % loopLenSec;
      phaseSamples = Math.round(phaseSec * sr);
    }

    // flat[0] entspricht dem Aufnahmebeginn; um die Eingangslatenz nach vorn schieben (compSamples)
    // und an die Loop-Phase setzen, an der die Aufnahme startete
    for (let i = 0; i < flat.length; i++) {
      const srcIdx = i + compSamples;
      if (srcIdx >= flat.length) break;
      const dest = (phaseSamples + i) % loopSamples;
      out[dest] = flat[srcIdx];
    }
    tr.buffer = buf;
  }

  // ---------- Loop-Transport ----------
  function startTransport(anchorTime) {
    if (transportRunning) return;
    loopLenSec = loopDuration();
    // Transport am Aufnahme-Raster der ersten Spur verankern (faellt auf Metronom-Downbeat)
    transportStart = (typeof anchorTime === "number") ? anchorTime : ac.currentTime + 0.1;
    transportRunning = true;
    scheduleLoops(transportStart);
    if (!firstCountInRunning) startMetronomeClock(transportStart, 0);
    firstCountInRunning = false;
    requestAnimationFrame(tick);
  }

  // alle belegten Spuren ab einem Zyklusbeginn als Loop starten
  function scheduleLoops(when) {
    for (const tr of tracks) {
      if (tr.buffer && tr.state === "loop") startTrackSource(tr, when);
    }
  }

  function startTrackSource(tr, when) {
    stopTrackSource(tr);
    const src = ac.createBufferSource();
    src.buffer = tr.buffer;
    src.loop = true;
    const g = ac.createGain();
    g.gain.value = effectiveGain(tr);
    const p = ac.createStereoPanner ? ac.createStereoPanner() : null;
    if (p) { p.pan.value = tr.pan; src.connect(g); g.connect(p); p.connect(masterGain); }
    else { src.connect(g); g.connect(masterGain); }
    const an = ac.createAnalyser(); an.fftSize = 256; g.connect(an); tr.analyser = an;
    src.start(when || ac.currentTime);
    tr.srcNode = src; tr.gainNode = g; tr.panNode = p;
  }

  function stopTrackSource(tr) {
    if (tr.srcNode) { try { tr.srcNode.stop(); } catch (e) {} try { tr.srcNode.disconnect(); } catch (e) {} tr.srcNode = null; }
    if (tr.gainNode) { try { tr.gainNode.disconnect(); } catch (e) {} tr.gainNode = null; }
    if (tr.panNode) { try { tr.panNode.disconnect(); } catch (e) {} tr.panNode = null; }
  }

  // ---------- Stomp-Ablauf: empty -> count-in -> recording -> loop ----------
  // ---------- Latenz-Kalibrierung (Klick-Test) ----------
  async function runCalibration() {
    if (!(await ensureAudio())) return;
    if (ac.state === "suspended") await ac.resume();
    if (!(await ensureMic())) return;     // Erlaubnis ist hier sicher erteilt
    if (transportRunning) { setStatus("CAL // ERST STOP ALL"); return; }

    // Countdown: Headset ABNEHMEN und ablegen, Hoerer neben das Mikro (NICHT auf den Ohren lassen)
    setStatus("CAL // HEADSET ABNEHMEN, HOERER NEBEN MIKRO... 3");
    await new Promise(r => setTimeout(r, 1000));
    setStatus("CAL // HOERER NEBEN MIKRO ABLEGEN... 2");
    await new Promise(r => setTimeout(r, 1000));
    setStatus("CAL // MESSUNG STARTET... 1");
    await new Promise(r => setTimeout(r, 1000));
    setStatus("CAL // MESSE...");

    const sr = ac.sampleRate;
    const recBuf = [];
    const proc = ac.createScriptProcessor(1024, 1, 1);
    proc.onaudioprocess = (e) => { recBuf.push(new Float32Array(e.inputBuffer.getChannelData(0))); };
    micSource.connect(proc);
    proc.connect(ac.destination);

    const t0 = ac.currentTime;
    const recStartAc = t0;
    const nClicks = 10;                   // mehr Klicks fuer robusteren Median
    const gap = 0.4;
    const clickTimes = [];
    for (let k = 0; k < nClicks; k++) {
      const ct = t0 + 0.4 + k * gap;
      clickTimes.push(ct);
      const osc = ac.createOscillator(), g = ac.createGain();
      osc.type = "square"; osc.frequency.value = 1200;
      osc.connect(g); g.connect(masterGain);
      g.gain.setValueAtTime(0.0001, ct);
      g.gain.exponentialRampToValueAtTime(0.25, ct + 0.001);
      g.gain.exponentialRampToValueAtTime(0.0001, ct + 0.02);
      osc.start(ct); osc.stop(ct + 0.03);
    }

    const totalMs = (0.4 + nClicks * gap + 0.4) * 1000;
    setTimeout(() => {
      try { micSource.disconnect(proc); } catch (e) {}
      try { proc.disconnect(); } catch (e) {}
      proc.onaudioprocess = null;
      let total = 0; for (const c of recBuf) total += c.length;
      const flat = new Float32Array(total);
      let o = 0; for (const c of recBuf) { flat.set(c, o); o += c.length; }

      const latencies = [];
      for (const ct of clickTimes) {
        const expectSample = Math.round((ct - recStartAc) * sr);
        const win = Math.round(0.18 * sr);
        let peakIdx = -1, peakVal = 0.012;
        for (let i = expectSample; i < Math.min(flat.length, expectSample + win); i++) {
          const v = Math.abs(flat[i]);
          if (v > peakVal) { peakVal = v; peakIdx = i; }
        }
        if (peakIdx >= 0) latencies.push((peakIdx - expectSample) / sr);
      }

      if (latencies.length >= 3) {
        latencies.sort((a, b) => a - b);
        const med = latencies[Math.floor(latencies.length / 2)];
        latencyComp = Math.max(0, med);
        setStatus("CAL // OK // " + Math.round(latencyComp * 1000) + " MS // " + latencies.length + " HITS");
      } else {
        let maxV = 0;
        for (let i = 0; i < flat.length; i++) { const v = Math.abs(flat[i]); if (v > maxV) maxV = v; }
        setStatus("CAL // KEIN SIGNAL // MAX PEGEL " + maxV.toFixed(3) + " // LAUTER STELLEN");
      }
    }, totalMs);
  }

  async function onStomp(tr) {
    if (!(await ensureAudio())) return;
    if (ac.state === "suspended") await ac.resume();

    if (tr.state === "empty") {
      if (!(await ensureMic())) return;
      tempo = clampInt(document.getElementById("tempo").value, 40, 240, 120);
      bars  = clampInt(document.getElementById("bars").value, 1, 8, 4);

      if (transportRunning || sessionMode) {
        // SESSION oder Folge-Spur: sofort zum naechsten Taktanfang
        let recStart;
        if (transportRunning) {
          recStart = nextCycleTime();
          if (recStart - ac.currentTime < 0.08) recStart += loopLenSec;
        } else {
          // Session Mode, erste Spur: Metronom starten, einen Takt Count-in
          const bd = beatDur();
          startMetronomeClock(ac.currentTime + 0.1, 0);
          firstCountInRunning = true;
          recStart = ac.currentTime + 0.1 + barDur();
        }
        tr.plannedRecStart = recStart;
        tr.state = "armed";
        setRing(tr, "REC", "#ff3b30");
        setStatus("TRK " + (tr.idx+1) + " // ARMED");
        requestAnimationFrame(tick);
        const waitMs = (recStart - ac.currentTime) * 1000;
        setTimeout(() => {
          if (tr.state !== "armed") return;
          tr.state = "recording";
          setRing(tr, "REC", "#ff3b30");
          setStatus("TRK " + (tr.idx+1) + " // RECORDING");
          tr.ringStart = performance.now();
          tr.ringDur = loopDuration() * 1000;
          startRecording(tr);
          requestAnimationFrame(tick);
          setTimeout(() => finishRecording(tr), loopDuration() * 1000 + 30);
        }, Math.max(0, waitMs));

      } else {
        // PRECISE, erste Spur: voller Warmup-Ablauf
        tr.state = "warmup";
        setRingWarmup(tr);
        setStatus("TRK " + (tr.idx+1) + " // WARMUP // ADJUST LEVELS");
        if (!metroTimer) {
          startMetronomeClock(ac.currentTime + 0.1, 0);
          warmupClockStarted = true;
        }
        metroOn = true;
        requestAnimationFrame(tick);
      }

    } else if (tr.state === "warmup") {
      // ---- Phase 2: Ausloesen, Metronom aussetzen, Count-in, Aufnahme ----
      const bd = beatDur();
      const len = transportRunning ? loopLenSec : loopDuration();
      const ref = transportRunning ? transportStart : metroClockStart;
      // naechster Ring-Durchlauf-Anfang (12 Uhr) ab jetzt, mit genug Vorlauf fuer den Count-in
      const minLead = 4 * bd + 0.2;
      const elapsed = ((ac.currentTime - ref) % len + len) % len;
      let nextRingStart = ac.currentTime - elapsed + len;   // naechstes Ringende
      while (nextRingStart - ac.currentTime < minLead) nextRingStart += len;
      const recStart = nextRingStart;
      tr.plannedRecStart = recStart;

      const countInStart = recStart - 4 * bd;
      setStatus("TRK " + (tr.idx+1) + " // GET READY FOR THE FINAL COUNT IN");

      // Metronom leise weiterlaufen lassen (Puls + Stimmung bleiben), Clock laeuft durch
      if (metroGain) metroGain.gain.setTargetAtTime(0.2, ac.currentTime, 0.02);

      // 4 Schlaege vor recStart Metronom wieder voll laut (Count-in)
      const reAudibleMs = (countInStart - ac.currentTime) * 1000;
      setTimeout(() => {
        if (tr.state !== "armed" && tr.state !== "recording") return;
        if (metroGain) metroGain.gain.setTargetAtTime(1, ac.currentTime, 0.01);
      }, Math.max(0, reAudibleMs));

      tr.state = "armed";

      // zur recStart-Zeit Aufnahme anwerfen
      const waitMs = (recStart - ac.currentTime) * 1000;
      setTimeout(() => {
        if (tr.state !== "armed") return;
        tr.state = "recording";
        setRing(tr, "REC", "#ff3b30");
        setStatus("TRK " + (tr.idx+1) + " // RECORDING");
        tr.ringStart = performance.now();
        tr.ringDur = loopDuration() * 1000;
        startRecording(tr);
        if (!transportRunning) firstCountInRunning = true;
        requestAnimationFrame(tick);
        setTimeout(() => finishRecording(tr), loopDuration() * 1000 + 30);
      }, Math.max(0, waitMs));

    } else if (tr.state === "loop") {
      toggleMute(tr);
    }
  }

  function finishRecording(tr) {
    if (tr.state !== "recording") return;
    const flat = stopRecording(tr);
    bakeLoop(tr, flat);
    tr.state = "loop";
    setRing(tr, "LOOP", TRACK_COLS[tr.idx]);
    setStatus("TRK " + (tr.idx+1) + " // LOOP");
    if (!transportRunning) {
      startTransport(tr.plannedRecStart);
    } else {
      // phasenrichtig sofort einsteigen: an der aktuellen Loop-Position in den Buffer springen,
      // nicht eine ganze Runde auf den naechsten Zyklus warten
      startTrackSourcePhase(tr);
    }
  }

  // Buffer-Spur sofort an der aktuellen Transport-Phase starten
  function startTrackSourcePhase(tr) {
    stopTrackSource(tr);
    const phase = ((ac.currentTime - transportStart) % loopLenSec + loopLenSec) % loopLenSec;
    const src = ac.createBufferSource();
    src.buffer = tr.buffer;
    src.loop = true;
    const g = ac.createGain();
    g.gain.value = effectiveGain(tr);
    const p = ac.createStereoPanner ? ac.createStereoPanner() : null;
    if (p) { p.pan.value = tr.pan; src.connect(g); g.connect(p); p.connect(masterGain); }
    else { src.connect(g); g.connect(masterGain); }
    const an = ac.createAnalyser(); an.fftSize = 256; g.connect(an); tr.analyser = an;
    // sofort starten, aber mitten im Buffer an der aktuellen Phase
    src.start(ac.currentTime, phase);
    tr.srcNode = src; tr.gainNode = g; tr.panNode = p;
  }

  // naechster Zyklusbeginn auf der Transport-Uhr
  function nextCycleTime() {
    if (!transportRunning) return ac.currentTime;
    const elapsed = ac.currentTime - transportStart;
    const n = Math.ceil(elapsed / loopLenSec);
    return transportStart + n * loopLenSec;
  }

  // ---------- Ring-Anzeige ----------
  function setRingWarmup(tr) {
    tr.core.textContent = "WARM";
    tr.ring.style.stroke = "#ffd400";
    tr.ring.style.filter = "drop-shadow(0 0 6px #ffd400)";
    tr.ring.style.opacity = "1";
    // strokeDashoffset NICHT auf 0 setzen (verursacht kurzen Vollausschlag-Blitz);
    // der tick-Loop setzt sofort die korrekte Position
    tr.led.style.background = "#ffd400"; tr.led.style.boxShadow = "0 0 8px #ffd400";
    tr.cap.textContent = "GO";
  }

  function setRing(tr, label, col) {
    tr.core.textContent = label;
    if (label === "EMPTY") {
      tr.ring.style.strokeDashoffset = "245";
      tr.ring.style.stroke = "#2a2b31";
      tr.led.style.background = "#2a0a08"; tr.led.style.boxShadow = "0 0 2px #000";
      tr.cap.textContent = "REC";
    } else if (label === "REC") {
      tr.ring.style.stroke = "#ff3b30";
      tr.ring.style.filter = "drop-shadow(0 0 5px #ff3b30)";
      tr.led.style.background = "#ff3b30"; tr.led.style.boxShadow = "0 0 8px #ff3b30";
      tr.cap.textContent = "REC";
    } else if (label === "LOOP") {
      tr.ring.style.stroke = "#6bff8c";
      tr.ring.style.filter = "drop-shadow(0 0 5px #6bff8c)";
      tr.led.style.background = TRACK_COLS[tr.idx]; tr.led.style.boxShadow = "0 0 8px " + TRACK_COLS[tr.idx];
      tr.cap.textContent = tr.muted ? "MUTE" : "PLAY";
    }
  }

  // Ring-Animation: Aufnahme-Fortschritt + Loop-Position + Peak-Meter
  const _pkData = new Uint8Array(256);
  function readPeak(an) {
    if (!an) return 0;
    an.getByteTimeDomainData(_pkData);
    let peak = 0;
    for (let i = 0; i < _pkData.length; i++) {
      const v = Math.abs(_pkData[i] - 128) / 128;
      if (v > peak) peak = v;
    }
    return peak;
  }
  function tick() {
    const now = performance.now();
    for (const tr of tracks) {
      if (tr.state === "warmup") {
        // gelbe Phase: Ring laeuft mit wie ein Loop, zeigt Position im Takt
        tr.ring.style.opacity = "1";
        let ref, len;
        if (transportRunning) { ref = transportStart; len = loopLenSec; }
        else { ref = metroClockStart; len = loopDuration(); }
        if (len > 0) {
          const elapsed = ((ac.currentTime - ref) % len + len) % len;
          const p = elapsed / len;
          tr.ring.style.strokeDashoffset = String(245 * (1 - p));
        }
        const pk = readPeak(inputAnalyser);
        tr.pkfill.style.height = Math.min(100, pk * 140) + "%";
      } else if (tr.state === "armed") {
        // Count-in laeuft: Ring laeuft gelb weiter wie in der Warmup-Phase
        tr.ring.style.opacity = "1";
        tr.ring.style.stroke = "#ffd400";
        tr.ring.style.filter = "drop-shadow(0 0 6px #ffd400)";
        let ref, len;
        if (transportRunning) { ref = transportStart; len = loopLenSec; }
        else { ref = metroClockStart; len = loopDuration(); }
        if (len > 0) {
          const elapsed = ((ac.currentTime - ref) % len + len) % len;
          tr.ring.style.strokeDashoffset = String(245 * (1 - elapsed / len));
        }
      } else if (tr.state === "recording" && tr.ringStart) {
        tr.ring.style.opacity = "1";
        const p = Math.min(1, (now - tr.ringStart) / tr.ringDur);
        tr.ring.style.strokeDashoffset = String(245 * (1 - p));
        const pk = readPeak(inputAnalyser);
        tr.pkfill.style.height = Math.min(100, pk * 140) + "%";
      } else if (tr.state === "loop" && transportRunning) {
        tr.ring.style.opacity = "1";
        const elapsed = (ac.currentTime - transportStart) % loopLenSec;
        const p = elapsed / loopLenSec;
        tr.ring.style.strokeDashoffset = String(245 * (1 - p));
        const pk = readPeak(tr.analyser);
        tr.pkfill.style.height = Math.min(100, pk * 140) + "%";
      } else {
        if (tr.pkfill) tr.pkfill.style.height = "0%";
      }
    }
    // Editor-Cursor mitlaufen lassen, wenn Editor sichtbar und Transport laeuft
    const editorVisible = document.getElementById("board-panel").style.display === "none";
    if (editorVisible && transportRunning && loopLenSec > 0) {
      const elapsed = (ac.currentTime - transportStart) % loopLenSec;
      const p = elapsed / loopLenSec;
      for (const tr of tracks) {
        if (tr.eCursor && tr.buffer) {
          tr.eCursor.style.opacity = "1";
          tr.eCursor.style.left = (p * 100) + "%";
        }
      }
    }
    // Gesamt-Peak-Meter (Summenpegel am Master)
    const omf = document.getElementById("outMeterFill");
    const omfe = document.getElementById("outMeterFillEd");
    if (omf || omfe) {
      const pk = readPeak(masterAnalyser);
      const pct = Math.min(100, pk * 130) + "%";
      if (omf) omf.style.width = pct;
      if (omfe) omfe.style.width = pct;
    }
    const active = transportRunning || tracks.some(t => t.state === "recording" || t.state === "warmup" || t.state === "armed");
    if (active) requestAnimationFrame(tick);
  }

  // ---------- Spur-Aktionen ----------
  function toggleMute(tr) {
    tr.muted = !tr.muted;
    applyAllGains();
    tr.cap.textContent = tr.muted ? "MUTE" : "PLAY";
    const mbtn = tr.el.querySelector('.ptrans button[data-act="mute"]');
    if (mbtn) mbtn.classList.toggle("on", tr.muted);
    if (tr.eRow) { const em = tr.eRow.querySelector('[data-eact="mute"]'); if (em) em.classList.toggle("on-mute", tr.muted); }
  }

  function clearTrack(tr) {
    stopTrackSource(tr);
    tr.buffer = null; tr.muted = false; tr.state = "empty";
    setRing(tr, "EMPTY");
    tr.el.querySelectorAll('.ptrans button').forEach(x => x.classList.remove("on"));
    // wenn keine Spur mehr laeuft, Transport + Metronom anhalten
    if (!tracks.some(t => t.state === "loop")) { transportRunning = false; stopMetronomeClock(); }
  }

  function setLevel(tr, v) {
    tr.level = Math.max(0, Math.min(1, v));
    if (tr.gainNode && !tr.muted) tr.gainNode.gain.value = effectiveGain(tr);
  }

  // ---------- Editor (zweite Ebene) ----------
  // Welche Spuren sind hoerbar: wenn irgendeine solo ist, nur die Solo-Spuren; sonst alle nicht-gemuteten
  function anySolo() { return tracks.some(t => t.solo && t.buffer); }
  function effectiveGain(tr) {
    if (tr.muted) return 0;
    if (anySolo() && !tr.solo) return 0;
    return tr.level;
  }
  function applyAllGains() {
    for (const t of tracks) {
      if (t.gainNode) t.gainNode.gain.value = effectiveGain(t);
    }
  }

  function buildEditor() {
    const host = document.getElementById("editorTracks");
    host.innerHTML = "";
    for (const tr of tracks) {
      // Haupt-Zeile
      const row = document.createElement("div");
      row.className = "etrack";
      row.style.setProperty("--track-col", TRACK_COLS[tr.idx]);
      row.innerHTML = `
        <span class="etrack-num">TRK ${tr.idx+1}</span>
        <div class="etrack-wavewrap" style="flex:1; display:flex;">
          ${tr.buffer
            ? `<div class="etrack-wave"><canvas></canvas><div class="etrack-cursor"></div></div>`
            : `<div class="etrack-empty">LEER</div>`}
        </div>
        <div class="etrack-ctrls">
          <button class="ebtn" data-eact="mute">MUTE</button>
          <button class="ebtn" data-eact="solo">SOLO</button>
          <button class="ebtn efx-toggle" data-eact="fx">FX</button>
          <div class="eknob"><input type="range" data-eact="level" min="0" max="100" value="${Math.round(tr.level*100)}"><span>LVL</span></div>
          <div class="eknob pan"><input type="range" data-eact="pan" min="-100" max="100" value="${Math.round(tr.pan*100)}"><span>PAN</span></div>
        </div>`;
      host.appendChild(row);

      // FX-Zeile (zunächst versteckt)
      const fxRow = document.createElement("div");
      fxRow.className = "efx-row";
      fxRow.style.display = "none";
      fxRow.dataset.trk = tr.idx;
      host.appendChild(fxRow);
      tr.eFxRow = fxRow;

      buildFxRow(tr);

      tr.eRow = row;
      tr.eCanvas = row.querySelector("canvas");
      tr.eCursor = row.querySelector(".etrack-cursor");

      const mb = row.querySelector('[data-eact="mute"]');
      const sb = row.querySelector('[data-eact="solo"]');
      const fb = row.querySelector('[data-eact="fx"]');
      mb.classList.toggle("on-mute", tr.muted);
      sb.classList.toggle("on-solo", tr.solo);

      mb.addEventListener("click", () => { toggleMute(tr); mb.classList.toggle("on-mute", tr.muted); });
      sb.addEventListener("click", () => { tr.solo = !tr.solo; sb.classList.toggle("on-solo", tr.solo); applyAllGains(); });
      fb.addEventListener("click", () => {
        const open = fxRow.style.display !== "none";
        fxRow.style.display = open ? "none" : "flex";
        fb.classList.toggle("on-fx", !open);
      });
      row.querySelector('[data-eact="level"]').addEventListener("input", (e) => {
        setLevel(tr, parseInt(e.target.value, 10) / 100);
      });
      row.querySelector('[data-eact="pan"]').addEventListener("input", (e) => {
        tr.pan = parseInt(e.target.value, 10) / 100;
        if (tr.panNode) tr.panNode.pan.value = tr.pan;
      });

      if (tr.buffer) drawWave(tr);
    }
  }

  // FX-Labels fuer die Bloecke
  const FX_LABELS = { eq: "EQ", distortion: "DIST", chorus: "CHORUS", reverb: "REVERB", gate: "GATE" };

  // ---------- 8-Band Graphic EQ: Kurven-Display + Griffpunkte (portiert aus dem Drecksler) ----------
  // ISO-Treppe 63-8k, Q1.41, Shelf-Enden. Kurve = echte Summenantwort via getFrequencyResponse.
  // Werte liegen pro Spur in tr.fxParams.eq.bands. Render bleibt applyFxChain (offline).
  const EQ8F = [63,125,250,500,1000,2000,4000,8000];
  const EQ8LBL = ["63","125","250","500","1K","2K","4K","8K"];
  const EQ8MIN = -12, EQ8MAX = 12;
  const EQ_FMIN = 20, EQ_FMAX = 20000, EQ_DBVIEW = 14, EQ_PAD = 10, EQ_N = 180;
  const eqFx2x = (f,w) => Math.log(f/EQ_FMIN)/Math.log(EQ_FMAX/EQ_FMIN)*w;
  const eqDb2y = (db,hh) => hh*0.5 - db/EQ_DBVIEW*(hh*0.5-EQ_PAD);
  const eqY2db = (y,hh) => (hh*0.5-y)/(hh*0.5-EQ_PAD)*EQ_DBVIEW;
  // Unverbundene Mess-Filterbank in eigenem Offline-Context (unabhaengig vom Playback)
  let eqMeasureCtx=null, eqMeasure=null, eqFreqsArr=null, eqMagArr=null, eqPhaseArr=null, eqSumArr=null;
  function eqMeasureBank() {
    if (eqMeasure) return eqMeasure;
    eqMeasureCtx = new OfflineAudioContext(1, 1, 44100);
    eqMeasure = EQ8F.map((f,i) => {
      const b = eqMeasureCtx.createBiquadFilter();
      b.type = (i===0) ? "lowshelf" : (i===EQ8F.length-1) ? "highshelf" : "peaking";
      b.frequency.value = f; b.Q.value = 1.41;
      return b;
    });
    eqFreqsArr = new Float32Array(EQ_N); eqMagArr = new Float32Array(EQ_N);
    eqPhaseArr = new Float32Array(EQ_N); eqSumArr = new Float32Array(EQ_N);
    for (let k=0;k<EQ_N;k++) eqFreqsArr[k] = EQ_FMIN*Math.pow(EQ_FMAX/EQ_FMIN, k/(EQ_N-1));
    return eqMeasure;
  }
  function eqCurveDb(bands) {
    const bank = eqMeasureBank();
    eqSumArr.fill(0);
    for (let i=0;i<bank.length;i++) {
      bank[i].gain.value = bands[i];
      bank[i].getFrequencyResponse(eqFreqsArr, eqMagArr, eqPhaseArr);
      for (let k=0;k<EQ_N;k++) eqSumArr[k] += 20*Math.log10(Math.max(1e-6, eqMagArr[k]));
    }
    return eqSumArr;
  }
  function eqBandAt(e, canvas, bands) {
    const r = canvas.getBoundingClientRect(), x = e.clientX-r.left, y = e.clientY-r.top;
    let best=-1, bd=18;
    for (let i=0;i<EQ8F.length;i++) {
      const d = Math.hypot(x-eqFx2x(EQ8F[i],r.width), y-eqDb2y(bands[i],r.height));
      if (d<bd) { bd=d; best=i; }
    }
    if (best<0) {                                            // kein Punkt-Treffer: naechstes Band horizontal
      let hd=28;
      for (let i=0;i<EQ8F.length;i++) {
        const d = Math.abs(x-eqFx2x(EQ8F[i],r.width));
        if (d<hd) { hd=d; best=i; }
      }
    }
    return best;
  }
  function drawEqGraph(canvas, g, bands, dragIdx) {
    const r = canvas.getBoundingClientRect(), w = r.width, hh = r.height;
    if (!w || !hh) return;                                   // Popup nicht sichtbar
    const dpr = window.devicePixelRatio || 1;
    if (canvas.width !== Math.round(w*dpr)) { canvas.width = Math.round(w*dpr); canvas.height = Math.round(hh*dpr); }
    g.setTransform(dpr,0,0,dpr,0,0);
    g.clearRect(0,0,w,hh);
    g.strokeStyle = "rgba(189,250,255,.10)"; g.lineWidth = 1; g.beginPath();
    for (const db of [-12,-6,6,12]) { const y = eqDb2y(db,hh); g.moveTo(0,y); g.lineTo(w,y); }
    for (const f of [50,100,200,500,1000,2000,5000,10000]) { const x = eqFx2x(f,w); g.moveTo(x,0); g.lineTo(x,hh); }
    g.stroke();
    const y0 = eqDb2y(0,hh);
    g.strokeStyle = "rgba(189,250,255,.3)"; g.beginPath(); g.moveTo(0,y0); g.lineTo(w,y0); g.stroke();
    g.fillStyle = "rgba(189,250,255,.75)"; g.font = "10px 'Space Mono',monospace";
    g.fillText("+12",4,eqDb2y(12,hh)+4); g.fillText("-12",4,eqDb2y(-12,hh)+4); g.fillText("0 DB",4,y0-4);
    for (let i=0;i<EQ8F.length;i++) g.fillText(EQ8LBL[i], eqFx2x(EQ8F[i],w)-g.measureText(EQ8LBL[i]).width/2, hh-4);
    // ECHTE Summenkurve: Neonlinie + Hauchfuellung zur 0-dB-Achse
    const curve = eqCurveDb(bands), yZero = eqDb2y(0,hh);
    g.save();
    g.beginPath();
    for (let k=0;k<EQ_N;k++) { const x = eqFx2x(eqFreqsArr[k],w), y = eqDb2y(curve[k],hh); if (k===0) g.moveTo(x,y); else g.lineTo(x,y); }
    g.lineTo(eqFx2x(eqFreqsArr[EQ_N-1],w), yZero); g.lineTo(eqFx2x(eqFreqsArr[0],w), yZero); g.closePath();
    g.fillStyle = "rgba(189,250,255,.10)"; g.fill();
    g.restore();
    g.strokeStyle = "#bdfaff"; g.lineWidth = 1.5;
    g.shadowColor = "rgba(189,250,255,.6)"; g.shadowBlur = 7;
    g.beginPath();
    for (let k=0;k<EQ_N;k++) { const x = eqFx2x(eqFreqsArr[k],w), y = eqDb2y(curve[k],hh); if (k===0) g.moveTo(x,y); else g.lineTo(x,y); }
    g.stroke(); g.shadowBlur = 0;
    for (let i=0;i<EQ8F.length;i++) {                        // Griffe: hohle Ringe, fuellen sich beim Anfassen
      const x = eqFx2x(EQ8F[i],w), y = eqDb2y(bands[i],hh), act = (i===dragIdx);
      g.beginPath(); g.arc(x,y, act?5.5:4, 0, Math.PI*2);
      g.fillStyle = act ? "#bdfaff" : "rgba(10,8,6,.92)"; g.fill();
      g.lineWidth = 1.4; g.strokeStyle = act ? "#ffffff" : "#bdfaff";
      if (act) { g.shadowColor = "rgba(189,250,255,.7)"; g.shadowBlur = 8; }
      g.stroke(); g.shadowBlur = 0;
    }
    if (dragIdx>=0) {                                        // Wert direkt am Griff ablesbar
      const x = eqFx2x(EQ8F[dragIdx],w), y = eqDb2y(bands[dragIdx],hh);
      const txt = (bands[dragIdx]>0?"+":"")+(+bands[dragIdx]).toFixed(1)+" DB";
      g.font = "11px 'Space Mono',monospace"; g.fillStyle = "#ffffff";
      const tw = g.measureText(txt).width, tx = Math.max(4, Math.min(w-tw-4, x+10)), ty = Math.max(13, y-10);
      g.fillText(txt, tx, ty);
    }
  }

  function buildFxRow(tr) {
    const fxRow = tr.eFxRow;
    fxRow.innerHTML = "";

    // Drag-sortierbare FX-Bloecke
    for (const fx of tr.fxChain) {
      const block = document.createElement("div");
      block.className = "efx-block" + (tr.fxParams[fx].on ? " on" : "");
      block.draggable = true;
      block.dataset.fx = fx;
      block.innerHTML = `
        <div class="efx-label">${FX_LABELS[fx]}</div>
        <button class="efx-onbtn">${tr.fxParams[fx].on ? "ON" : "OFF"}</button>`;
      fxRow.appendChild(block);

      // ON/OFF Toggle
      block.querySelector(".efx-onbtn").addEventListener("click", (e) => {
        e.stopPropagation();
        tr.fxParams[fx].on = !tr.fxParams[fx].on;
        block.classList.toggle("on", tr.fxParams[fx].on);
        block.querySelector(".efx-onbtn").textContent = tr.fxParams[fx].on ? "ON" : "OFF";
      });

      // Klick auf Block (nicht auf ON/OFF) oeffnet Popup
      block.addEventListener("click", (e) => {
        if (e.target.closest(".efx-onbtn")) return;
        openFxPopup(tr, fx, block);
      });

      // Drag-and-Drop
      block.addEventListener("dragstart", (e) => {
        e.dataTransfer.setData("fx", fx);
        e.dataTransfer.setData("trk", tr.idx);
        block.classList.add("dragging");
      });
      block.addEventListener("dragend", () => block.classList.remove("dragging"));
      block.addEventListener("dragover", (e) => { e.preventDefault(); block.classList.add("drag-over"); });
      block.addEventListener("dragleave", () => block.classList.remove("drag-over"));
      block.addEventListener("drop", (e) => {
        e.preventDefault();
        block.classList.remove("drag-over");
        const draggedFx = e.dataTransfer.getData("fx");
        const draggedTrk = parseInt(e.dataTransfer.getData("trk"), 10);
        if (draggedTrk !== tr.idx || draggedFx === fx) return;
        // Reihenfolge in fxChain tauschen
        const chain = tr.fxChain;
        const fromIdx = chain.indexOf(draggedFx);
        const toIdx = chain.indexOf(fx);
        chain.splice(fromIdx, 1);
        chain.splice(toIdx, 0, draggedFx);
        buildFxRow(tr);  // neu aufbauen mit neuer Reihenfolge
      });
    }

    // APPLY und UNDO rechts
    const actions = document.createElement("div");
    actions.className = "efx-actions";
    actions.innerHTML = `
      <button class="ebtn efx-undo" ${tr.fxHistory ? "" : "disabled"}>UNDO</button>
      <button class="ebtn efx-apply" ${tr.buffer ? "" : "disabled"}>APPLY</button>`;
    fxRow.appendChild(actions);

    actions.querySelector(".efx-apply").addEventListener("click", () => applyFxChain(tr));
    actions.querySelector(".efx-undo").addEventListener("click", () => undoFx(tr));
  }

  // Globales Popup-Element
  let fxPopup = null;
  function ensureFxPopup() {
    if (fxPopup) return;
    fxPopup = document.createElement("div");
    fxPopup.className = "efx-popup";
    fxPopup.style.display = "none";
    document.body.appendChild(fxPopup);
    document.addEventListener("click", (e) => {
      if (fxPopup && !fxPopup.contains(e.target) && !e.target.closest(".efx-block")) {
        fxPopup.style.display = "none";
      }
    });
  }

  function openFxPopup(tr, fx, block) {
    ensureFxPopup();
    const p = tr.fxParams[fx];
    let html = `<div class="efx-popup-head"><span>${FX_LABELS[fx]}</span><button class="efx-popup-close">✕</button></div><div class="efx-popup-body">`;

    if (fx === "eq") {
      html += `<div class="efx-eq-graph-wrap"><canvas class="efx-eq-canvas"></canvas></div>`;
    } else if (fx === "distortion") {
      html += `<div class="efx-knob-row">
        <div class="efx-knob-grp"><label>DRIVE</label><input type="range" min="0" max="100" value="${Math.round(p.drive*100)}" data-param="drive"><span class="efx-val">${Math.round(p.drive*100)}%</span></div>
      </div>`;
    } else if (fx === "chorus") {
      html += `<div class="efx-knob-row">
        <div class="efx-knob-grp"><label>DEPTH</label><input type="range" min="0" max="100" value="${p.depth}" data-param="depth"><span class="efx-val">${p.depth}%</span></div>
        <div class="efx-knob-grp"><label>RATE</label><input type="range" min="1" max="50" value="${Math.round(p.rate*10)}" data-param="rate"><span class="efx-val">${p.rate.toFixed(1)} Hz</span></div>
      </div>`;
    } else if (fx === "reverb") {
      html += `<div class="efx-knob-row">
        <div class="efx-knob-grp"><label>SIZE</label><input type="range" min="0" max="100" value="${Math.round(p.size*100)}" data-param="size"><span class="efx-val">${Math.round(p.size*100)}%</span></div>
        <div class="efx-knob-grp"><label>WET</label><input type="range" min="0" max="100" value="${Math.round(p.wet*100)}" data-param="wet"><span class="efx-val">${Math.round(p.wet*100)}%</span></div>
      </div>`;
    } else if (fx === "gate") {
      html += `<div class="efx-knob-row">
        <div class="efx-knob-grp"><label>THRESHOLD</label><input type="range" min="-60" max="0" value="${p.threshold}" data-param="threshold"><span class="efx-val">${p.threshold} dB</span></div>
      </div>`;
    }

    html += `</div>`;
    fxPopup.innerHTML = html;

    // Event-Handler fuer die Regler
    if (fx === "eq") {
      const canvas = fxPopup.querySelector(".efx-eq-canvas");
      const g = canvas.getContext("2d");
      const bands = tr.fxParams.eq.bands;
      let ptDrag = -1;
      const redraw = () => drawEqGraph(canvas, g, bands, ptDrag);
      const setBand = (i, db) => { bands[i] = Math.max(EQ8MIN, Math.min(EQ8MAX, Math.round(db*2)/2)); redraw(); };
      canvas.addEventListener("pointerdown", (e) => {
        const band = eqBandAt(e, canvas, bands); if (band < 0) return;
        ptDrag = band; canvas.setPointerCapture(e.pointerId);
        const r = canvas.getBoundingClientRect();
        setBand(band, eqY2db(e.clientY - r.top, r.height));
      });
      canvas.addEventListener("pointermove", (e) => {
        if (ptDrag < 0) return;
        const r = canvas.getBoundingClientRect();
        setBand(ptDrag, eqY2db(e.clientY - r.top, r.height));
      });
      const ptEnd = () => { if (ptDrag >= 0) { ptDrag = -1; redraw(); } };
      canvas.addEventListener("pointerup", ptEnd);
      canvas.addEventListener("pointercancel", ptEnd);
      canvas.addEventListener("dblclick", (e) => { const band = eqBandAt(e, canvas, bands); if (band >= 0) setBand(band, 0); });
      requestAnimationFrame(redraw);
    } else {
      fxPopup.querySelectorAll("[data-param]").forEach(inp => {
        inp.addEventListener("input", () => {
          const param = inp.dataset.param;
          const raw = parseInt(inp.value, 10);
          if (fx === "distortion") {
            tr.fxParams.distortion.drive = raw / 100;
            inp.nextElementSibling.textContent = raw + "%";
          } else if (fx === "chorus") {
            if (param === "depth") { tr.fxParams.chorus.depth = raw; inp.nextElementSibling.textContent = raw + "%"; }
            if (param === "rate") { tr.fxParams.chorus.rate = raw / 10; inp.nextElementSibling.textContent = (raw/10).toFixed(1) + " Hz"; }
          } else if (fx === "reverb") {
            if (param === "size") { tr.fxParams.reverb.size = raw / 100; inp.nextElementSibling.textContent = raw + "%"; }
            if (param === "wet") { tr.fxParams.reverb.wet = raw / 100; inp.nextElementSibling.textContent = raw + "%"; }
          } else if (fx === "gate") {
            tr.fxParams.gate.threshold = raw; inp.nextElementSibling.textContent = raw + " dB";
          }
        });
      });
    }

    fxPopup.querySelector(".efx-popup-close").addEventListener("click", () => {
      fxPopup.style.display = "none";
    });

    // Position: oberhalb des Blocks
    const rect = block.getBoundingClientRect();
    fxPopup.style.display = "block";
    const pw = fxPopup.offsetWidth;
    const ph = fxPopup.offsetHeight;
    let left = rect.left + window.scrollX;
    let top = rect.top + window.scrollY - ph - 8;
    if (top < 8) top = rect.bottom + window.scrollY + 8;
    if (left + pw > window.innerWidth - 8) left = window.innerWidth - pw - 8;
    fxPopup.style.left = left + "px";
    fxPopup.style.top = top + "px";
  }

  function applyFxChain(tr) {
    if (!tr.buffer || !ac) return;
    const buf = tr.buffer;
    tr.fxHistory = buf.getChannelData(0).slice();
    const freqs = [63, 125, 250, 500, 1000, 2000, 4000, 8000];
    setStatus("FX // PROCESSING // TRK " + (tr.idx+1));
    const off = new OfflineAudioContext(buf.numberOfChannels, buf.length, buf.sampleRate);
    const src = off.createBufferSource();
    src.buffer = buf;
    const mk = (type, freq, Q, g) => {
      const b = off.createBiquadFilter();
      b.type = type; b.frequency.value = freq; b.Q.value = Q; b.gain.value = g || 0;
      return b;
    };
    let tail = src;
    for (const fx of tr.fxChain) {
      const p = tr.fxParams[fx];
      if (!p.on) continue;
      if (fx === "eq") {
        for (let i = 0; i < 8; i++) {
          const b = mk(i === 0 ? "lowshelf" : i === 7 ? "highshelf" : "peaking", freqs[i], 1.41, p.bands[i]);
          tail.connect(b); tail = b;
        }
      } else if (fx === "distortion") {
        const wave = off.createWaveShaper();
        const amount = p.drive * 400;
        const curve = new Float32Array(256);
        for (let i = 0; i < 256; i++) {
          const x = (i * 2) / 256 - 1;
          curve[i] = ((Math.PI + amount) * x) / (Math.PI + amount * Math.abs(x));
        }
        wave.curve = curve; wave.oversample = "4x";
        tail.connect(wave); tail = wave;
      } else if (fx === "chorus") {
        const delay = off.createDelay(0.05);
        delay.delayTime.value = (p.depth / 1000) * 0.02;
        const lfo = off.createOscillator();
        lfo.frequency.value = p.rate;
        const lfoGain = off.createGain(); lfoGain.gain.value = 0.003;
        lfo.connect(lfoGain); lfoGain.connect(delay.delayTime); lfo.start(0);
        const mix = off.createGain(); mix.gain.value = 0.7;
        tail.connect(delay); delay.connect(mix); tail.connect(mix); tail = mix;
      } else if (fx === "reverb") {
        const conv = off.createConvolver();
        const irLen = Math.floor(buf.sampleRate * (0.5 + p.size * 2.5));
        const ir = off.createBuffer(1, irLen, buf.sampleRate);
        const irData = ir.getChannelData(0);
        for (let i = 0; i < irLen; i++) irData[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / irLen, 2);
        conv.buffer = ir;
        const dry = off.createGain(); dry.gain.value = 1 - p.wet;
        const wet = off.createGain(); wet.gain.value = p.wet;
        const sum = off.createGain();
        tail.connect(dry); dry.connect(sum);
        tail.connect(conv); conv.connect(wet); wet.connect(sum); tail = sum;
      } else if (fx === "gate") {
        const gateNode = off.createScriptProcessor(4096, 1, 1);
        const thresh = Math.pow(10, p.threshold / 20);
        gateNode.onaudioprocess = (e) => {
          const inp = e.inputBuffer.getChannelData(0);
          const out = e.outputBuffer.getChannelData(0);
          for (let i = 0; i < inp.length; i++) out[i] = Math.abs(inp[i]) > thresh ? inp[i] : 0;
        };
        tail.connect(gateNode); tail = gateNode;
      }
    }
    tail.connect(off.destination);
    src.start(0);
    off.startRendering().then((rendered) => {
      const newBuf = ac.createBuffer(rendered.numberOfChannels, rendered.length, rendered.sampleRate);
      for (let c = 0; c < rendered.numberOfChannels; c++)
        newBuf.getChannelData(c).set(rendered.getChannelData(c));
      tr.buffer = newBuf;
      if (tr.state === "loop") { stopTrackSource(tr); startTrackSourcePhase(tr); }
      setStatus("FX // APPLIED // TRK " + (tr.idx+1));
      drawWave(tr); buildFxRow(tr);
    });
  }

  function undoFx(tr) {
    if (!tr.fxHistory || !ac) return;
    const buf = ac.createBuffer(1, tr.fxHistory.length, ac.sampleRate);
    buf.getChannelData(0).set(tr.fxHistory);
    tr.buffer = buf;
    tr.fxHistory = null;
    if (tr.state === "loop") {
      stopTrackSource(tr);
      startTrackSourcePhase(tr);
    }
    setStatus("FX // UNDO // TRK " + (tr.idx+1));
    drawWave(tr);
    buildFxRow(tr);
  }

  function drawWave(tr) {
    const cv = tr.eCanvas;
    if (!cv || !tr.buffer) return;
    const rect = cv.getBoundingClientRect();
    const w = Math.max(200, Math.floor(rect.width));
    const h = 84;
    cv.width = w; cv.height = h;
    const ctx = cv.getContext("2d");
    ctx.clearRect(0, 0, w, h);
    const data = tr.buffer.getChannelData(0);
    const step = Math.max(1, Math.floor(data.length / w));
    const mid = h / 2;
    ctx.strokeStyle = TRACK_COLS[tr.idx];
    ctx.globalAlpha = 0.95;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    for (let x = 0; x < w; x++) {
      let min = 1, max = -1;
      for (let j = 0; j < step; j++) {
        const v = data[x * step + j] || 0;
        if (v < min) min = v;
        if (v > max) max = v;
      }
      ctx.moveTo(x + 0.5, mid + min * mid * 0.95);
      ctx.lineTo(x + 0.5, mid + max * mid * 0.95);
    }
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  function showEditor() {
    document.getElementById("board-panel").style.display = "none";
    document.getElementById("editor-panel").style.display = "";
    buildEditor();
  }
  function showBoard() {
    document.getElementById("editor-panel").style.display = "none";
    document.getElementById("board-panel").style.display = "";
  }

  function clampInt(v, lo, hi, def) {
    v = parseInt(v, 10); if (isNaN(v)) return def;
    return Math.max(lo, Math.min(hi, v));
  }

  // ---------- Pedal-DOM bauen ----------
  function makePedal(i) {
    const col = TRACK_COLS[i];
    const el = document.createElement("div");
    el.className = "pedal";
    el.style.setProperty("--track-col", col);
    el.innerHTML = `
      <span class="pedal-screw a"></span><span class="pedal-screw b"></span>
      <span class="pedal-screw c"></span><span class="pedal-screw d"></span>
      <div class="pedal-num">TRK ${i + 1}</div>
      <div class="ring-wrap">
        <svg viewBox="0 0 88 88">
          <circle class="ring-bg" cx="44" cy="44" r="39"/>
          <circle class="ring-fg" cx="44" cy="44" r="39"/>
        </svg>
        <div class="ring-core">EMPTY</div>
      </div>
      <div class="ptrans">
        <button data-act="clear">CLR</button>
        <button data-act="mute">MUTE</button>
        <button data-act="fx">FX</button>
      </div>
      <div class="fader-row">
        <div class="fader">
          <div class="fader-slot"></div>
          <div class="fader-cap" style="top: 22px;"></div>
        </div>
        <div class="pkmeter"><div class="pkfill"></div></div>
      </div>
      <div class="stomp" data-trk="${i}">
        <span class="led"></span>
        <div class="cap">REC</div>
      </div>
      <div class="pedal-label">REC / DUB / PLAY</div>
    `;
    const tr = tracks[i];
    tr.el = el;
    tr.ring = el.querySelector(".ring-fg");
    tr.core = el.querySelector(".ring-core");
    tr.cap = el.querySelector(".stomp .cap");
    tr.led = el.querySelector(".led");
    tr.pkfill = el.querySelector(".pkfill");

    el.querySelector(".stomp").addEventListener("click", () => onStomp(tr));
    el.querySelectorAll(".ptrans button").forEach((b) => {
      b.addEventListener("click", () => {
        const act = b.dataset.act;
        if (act === "clear") clearTrack(tr);
        else if (act === "mute") toggleMute(tr);
        else if (act === "fx") { b.classList.toggle("on"); setStatus("TRK " + (i+1) + " // FX (EDITOR FOLGT)"); }
      });
    });

    // Fader
    const f = el.querySelector(".fader");
    const cap = f.querySelector(".fader-cap");
    let drag = false;
    const apply = (clientY) => {
      const r = f.getBoundingClientRect();
      let y = clientY - r.top - 6;
      y = Math.max(8, Math.min(r.height - 18, y));
      cap.style.top = y + "px";
      // oben = laut, unten = leise
      const range = (r.height - 18) - 8;
      const v = 1 - (y - 8) / range;
      setLevel(tr, v);
    };
    cap.addEventListener("pointerdown", (e) => { drag = true; cap.setPointerCapture(e.pointerId); });
    cap.addEventListener("pointermove", (e) => { if (drag) apply(e.clientY); });
    cap.addEventListener("pointerup", () => { drag = false; });

    return el;
  }

  for (let i = 0; i < N_TRACKS; i++) board.appendChild(makePedal(i));

  // ---------- Master-Leiste ----------
  document.getElementById("tempo").addEventListener("change", (e) => {
    tempo = clampInt(e.target.value, 40, 240, 120);
  });
  document.getElementById("bars").addEventListener("change", (e) => {
    bars = clampInt(e.target.value, 1, 8, 4);
  });
  document.getElementById("stopAll").addEventListener("click", () => {
    for (const tr of tracks) stopTrackSource(tr);
    transportRunning = false;
    stopMetronomeClock();
    setStatus("SYSTEM // STOPPED");
  });
  document.getElementById("editorBtn").addEventListener("click", () => showEditor());
  document.getElementById("boardBtn").addEventListener("click", () => showBoard());
  document.getElementById("playAll").addEventListener("click", async () => {
    if (!(await ensureAudio())) return;
    if (ac.state === "suspended") await ac.resume();
    if (!transportRunning && tracks.some(t => t.buffer)) {
      for (const tr of tracks) if (tr.buffer) tr.state = "loop";
      startTransport();
      setStatus("SYSTEM // PLAYING");
    }
  });
  document.getElementById("monBtn").addEventListener("click", async (e) => {
    if (!(await ensureAudio())) return;
    if (ac.state === "suspended") await ac.resume();
    if (!(await ensureMic())) return;
    monitorOn = !monitorOn;
    if (monGain) monGain.gain.value = monitorOn ? 1 : 0;
    e.target.classList.toggle("go", monitorOn);
    setStatus(monitorOn ? "MONITOR // ON (USE HEADPHONES)" : "MONITOR // OFF");
  });
  document.getElementById("inGain").addEventListener("input", (e) => {
    const pct = parseInt(e.target.value, 10);
    inputGainValue = pct / 100;
    if (inputGain) inputGain.gain.setTargetAtTime(inputGainValue, ac.currentTime, 0.02);
    document.getElementById("inGainVal").textContent = pct + "%";
  });
  document.getElementById("calBtn").addEventListener("click", () => runCalibration());
  document.getElementById("modeBtn").addEventListener("click", () => {
    sessionMode = !sessionMode;
    const btn = document.getElementById("modeBtn");
    btn.textContent = sessionMode ? "SESSION" : "PRECISE";
    btn.classList.toggle("active", sessionMode);
    setStatus("MODE // " + (sessionMode ? "SESSION" : "PRECISE"));
  });
</script>

</body>
